{% extends "webclient/base.html" %}
{% load static %}

{% block client %}

<style>
body #toolbar {
  display: flex !important;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  background: #111;
  border-bottom: 1px solid #2d2d2d;
  color: #d4d4d4;
  font-size: 12px;
}

body #toolbar button.active,
body #toolbar button[aria-pressed="true"] {
  border-color: #6ab0ff !important;
  background: #16324a !important;
  color: #e7f3ff !important;
  box-shadow: inset 0 0 0 1px rgba(106, 176, 255, 0.25);
}

body #toolbar.toolbar-collapsed > :not(#optionsbutton) {
  display: none !important;
}

body .inputfieldwrapper {
  display: flex;
  align-items: stretch;
  gap: 10px;
}

body .inputfieldwrapper .inputfield {
  order: 1;
}

body .inputfieldwrapper .direction-pad {
  order: 2;
}

body .inputfieldwrapper .inputsend {
  order: 3;
  position: static !important;
  top: auto !important;
  right: auto !important;
}
</style>

<div id="toolbar"></div>

<div id="main" class="split split-vertical" data-role-default>
  <div id="main-sub" class="split-sub">
    <div id="messagewindow"></div>
  </div>
</div>

<div id="input" class="split split-vertical" data-role-input data-update-append>
  <div id="inputform" class="wrapper">
    <div id="prompt" class="prompt">
    </div>
    <div id="inputcontrol" class="input-group">
      <textarea id="inputfield" type="text" class="form-control"></textarea>
      <span class="input-group-btn">
        <button class="btn btn-large btn-outline-primary" id="inputsend" type="button" value="">&gt;</button>
      </span>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{% static 'webclient/js/plugins/chat_layout.js' %}" language="javascript" type="text/javascript"></script>
<script src="{% static 'webclient/js/plugins/direction_pad.js' %}" language="javascript" type="text/javascript"></script>
{% endblock %}
